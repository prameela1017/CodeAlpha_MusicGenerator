<!DOCTYPE html>
<html>
<head>
    <title>AI Music Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }
        .card {
            border-radius: 20px;
        }
        .btn-custom {
            border-radius: 25px;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow text-center">

        <h2>🎵 AI Music Generator</h2>
        <p>Generate random music using AI concepts</p>

        <form method="POST">
            <button class="btn btn-primary btn-lg btn-custom">
                🎶 Generate Music
            </button>
        </form>

        <hr>

        <h5>Download Your Music:</h5>
        <a href="/static/output.mid" class="btn btn-success btn-custom mt-2">
            ⬇️ Download MIDI
        </a>

    </div>
</div>

</body>
</html>
